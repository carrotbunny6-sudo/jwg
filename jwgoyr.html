<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Live Dashboard - SJKC Nan Hwa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700;800&display=swap');

        :root {
            /* Warm, dawn-inspired "Biblical Joy" Palette */
            --bg-top: #fffcf5;
            --bg-bottom: #fdf2d8;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #4a3728; /* Deep warm brown */
            --text-muted: #8c7b6d; /* Soft earth */
            --accent-gold: #c58e1c; /* Sunlit gold */
            --accent-terra: #bc5e3a; /* Terracotta / Clay */
            --accent-olive: #6b8242; /* Olive branch green */
            --border-color: rgba(197, 142, 28, 0.15);
            --shadow-soft: 0 12px 24px rgba(74, 55, 40, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', system-ui, sans-serif;
            background: linear-gradient(145deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem;
            overflow-x: hidden;
        }

        .dashboard {
            width: 100%;
            max-width: 500px; /* Mobile focused max-width */
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* Top Header */
        .header {
            text-align: center;
            padding: 0.5rem 0 1rem 0;
        }

        .teacher-name {
            font-family: 'Lora', serif;
            font-size: 1.4rem;
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .school-name {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .live-clock {
            font-family: 'Lora', serif;
            font-size: 3.5rem;
            font-weight: 600;
            color: var(--accent-gold);
            line-height: 1;
            margin-top: 1rem;
            text-shadow: 0 2px 10px rgba(197, 142, 28, 0.15);
        }

        .live-date {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 0.5rem;
        }

        /* Cards */
        .card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-color);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .card-label {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 1rem;
            color: var(--accent-terra);
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Status Dot Animation (Gentle glow) */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-olive);
            box-shadow: 0 0 0 0 rgba(107, 130, 66, 0.4);
            animation: pulse-warm 2.5s infinite;
        }
        .status-dot.idle {
            background-color: var(--text-muted);
            animation: none;
            box-shadow: none;
        }

        @keyframes pulse-warm {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(107, 130, 66, 0.4); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(107, 130, 66, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(107, 130, 66, 0); }
        }

        /* Currently Section */
        .current-info {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            color: var(--text-main);
            margin-top: 0.25rem;
        }
        .current-subtext {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            line-height: 1.4;
        }

        /* Next Up Section */
        .countdown-timer {
            font-family: 'Lora', serif;
            font-size: 2.8rem;
            font-weight: 600;
            color: var(--accent-gold);
            line-height: 1;
            margin: 0.5rem 0 0.75rem 0;
            font-variant-numeric: tabular-nums;
        }
        .next-sentence {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.5;
        }
        .next-sentence strong {
            color: var(--accent-terra);
        }

        /* Search Section */
        .search-card {
            gap: 1rem;
        }
        
        .search-controls {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .time-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        select, input[type="time"] {
            background-color: #fffcf5;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            outline: none;
            flex-grow: 1;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            appearance: none; /* helps with mobile styling */
        }

        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238c7b6d%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem top 50%;
            background-size: 0.65rem auto;
            padding-right: 2.5rem;
        }

        select:focus, input[type="time"]:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(197, 142, 28, 0.1);
        }

        .to-text {
            color: var(--text-muted);
            font-family: 'Lora', serif;
            font-style: italic;
        }

        button {
            background-color: var(--accent-gold);
            color: #fff;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-family: 'Lora', serif;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 0.5rem;
            box-shadow: 0 4px 12px rgba(197, 142, 28, 0.2);
        }
        button:hover {
            background-color: #aa7a18;
        }
        button:active {
            transform: scale(0.98);
        }

        .search-results {
            font-size: 1rem;
            font-weight: 600;
            margin-top: 0.5rem;
            padding: 1rem;
            border-radius: 12px;
            background-color: rgba(255,255,255,0.5);
            border: 1px dashed var(--border-color);
        }

        .free-text { color: var(--accent-olive); }
        .busy-text { color: var(--accent-terra); }

        ul.conflict-list {
            list-style: none;
            margin-top: 0.5rem;
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: 400;
        }
        ul.conflict-list li {
            padding-top: 0.25rem;
        }
        ul.conflict-list li::before {
            content: "✦";
            color: var(--accent-gold);
            font-size: 0.8rem;
            display: inline-block;
            width: 1.5em;
        }

    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <div class="teacher-name">Cik Ong Yi Rong</div>
            <div class="school-name">SJKC Nan Hwa</div>
            <div class="live-clock" id="liveClock">00:00</div>
            <div class="live-date" id="liveDate">Loading...</div>
        </div>

        <div class="card">
            <div class="card-label">
                <div class="status-dot" id="currentDot"></div>
                Current Grace
            </div>
            <div id="currentInfo" class="current-info">Fetching schedule...</div>
            <div id="currentSubtext" class="current-subtext"></div>
        </div>

        <div class="card">
            <div class="card-label">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                Approaching
            </div>
            <div class="countdown-timer" id="countdownTimer">--:--:--</div>
            <div class="next-sentence" id="nextSentence">Looking for your next season...</div>
        </div>

        <div class="card search-card">
            <div class="card-label" style="color: var(--accent-gold);">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg>
                Seek Availability
            </div>
            <div class="search-controls">
                <select id="searchDay">
                    <option value="1">Monday</option>
                    <option value="2">Tuesday</option>
                    <option value="3">Wednesday</option>
                    <option value="4">Thursday</option>
                    <option value="5">Friday</option>
                </select>
                <div class="time-row">
                    <input type="time" id="searchStart" value="11:00">
                    <span class="to-text">to</span>
                    <input type="time" id="searchEnd" value="11:30">
                </div>
                <button onclick="checkFreeTime()">Check Time</button>
            </div>
            <div class="search-results" id="searchResults">
                <span style="color: var(--text-muted); font-weight: 400;">Select a time block to see if you are free to rest or prepare.</span>
            </div>
        </div>
    </div>

    <script>
        // Master Schedule Data
        const scheduleMap = {
            1:[ // Monday
                { start: "07:00", end: "07:30", subject: "Supervision Duty", class: "", location: "Canteen", type: "duty" },
                { start: "07:30", end: "08:00", subject: "PH周会 (Assembly)", class: "6M", location: "Bilik Darjah", type: "teaching" },
                { start: "08:00", end: "09:00", subject: "BC华文 (Mandarin)", class: "6M", location: "Bilik Darjah", type: "teaching" },
                { start: "10:00", end: "10:20", subject: "Supervision Duty", class: "", location: "Canteen", type: "duty" },
                { start: "11:20", end: "12:20", subject: "BI英文 (English)", class: "2M", location: "Bilik Darjah", type: "teaching" },
                { start: "13:05", end: "13:35", subject: "Supervision Duty", class: "", location: "Canteen", type: "duty" }
            ],
            2:[ // Tuesday
                { start: "07:30", end: "08:00", subject: "PJ体育 (PE)", class: "2M", location: "Padang", type: "teaching" },
                { start: "08:00", end: "08:30", subject: "PK健教 (Health)", class: "2M", location: "Bilik Darjah", type: "teaching" },
                { start: "09:00", end: "10:00", subject: "BI英文 (English)", class: "4M", location: "Bilik Darjah", type: "teaching" },
                { start: "10:00", end: "10:20", subject: "REHAT (Break)", class: "", location: "Canteen", type: "break" },
                { start: "10:20", end: "11:20", subject: "BC华文 (Mandarin)", class: "6M", location: "Bilik Darjah", type: "teaching" },
                { start: "12:20", end: "13:05", subject: "BC华文 (Mandarin)", class: "6M", location: "Bilik Darjah", type: "teaching" }
            ],
            3:[ // Wednesday
                { start: "07:10", end: "07:30", subject: "Morning Reading (Mandarin)", class: "6M", location: "Bilik Darjah", type: "teaching" },
                { start: "07:30", end: "08:30", subject: "PA道伊 (Moral/Islamic)", class: "6M", location: "Bilik Darjah", type: "teaching" },
                { start: "09:00", end: "10:00", subject: "BI英文 (English)", class: "2M", location: "Bilik Darjah", type: "teaching" },
                { start: "10:00", end: "10:20", subject: "REHAT (Break)", class: "", location: "Canteen", type: "break" },
                { start: "10:20", end: "11:20", subject: "BI英文 (English)", class: "4M", location: "Bilik Darjah", type: "teaching" },
                { start: "12:20", end: "13:05", subject: "BC华文 (Mandarin)", class: "6M", location: "Bilik Darjah", type: "teaching" }
            ],
            4:[ // Thursday
                { start: "07:30", end: "08:30", subject: "1M1S", class: "6M", location: "Bilik Darjah / Padang", type: "teaching" },
                { start: "08:30", end: "09:00", subject: "PJ体育 (PE)", class: "2M", location: "Padang", type: "teaching" },
                { start: "10:00", end: "10:20", subject: "REHAT (Break)", class: "", location: "Canteen", type: "break" },
                { start: "10:20", end: "11:20", subject: "BC华文 (Mandarin)", class: "6M", location: "Bilik Darjah", type: "teaching" },
                { start: "11:20", end: "12:20", subject: "BI英文 (English)", class: "2M", location: "Bilik Darjah", type: "teaching" }
            ],
            5:[ // Friday
                { start: "07:10", end: "07:30", subject: "Morning Reading (English)", class: "4M", location: "Bilik Darjah", type: "teaching" },
                { start: "09:30", end: "10:00", subject: "PA道伊 (Moral/Islamic)", class: "6M", location: "Bilik Darjah", type: "teaching" },
                { start: "10:00", end: "10:20", subject: "REHAT (Break)", class: "", location: "Canteen", type: "break" },
                { start: "10:20", end: "11:20", subject: "BI英文 (English)", class: "4M", location: "Bilik Darjah", type: "teaching" }
            ]
        };

        function parseTime(timeStr, baseDate) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const d = new Date(baseDate);
            d.setHours(hours, minutes, 0, 0);
            return d;
        }

        function getLiveEvents(now) {
            let upcomingEvents =[];
            let currentEvent = null;

            for (let i = 0; i <= 7; i++) {
                let targetDate = new Date(now);
                targetDate.setDate(now.getDate() + i);
                let dayOfWeek = targetDate.getDay();

                if (scheduleMap[dayOfWeek]) {
                    scheduleMap[dayOfWeek].forEach(evt => {
                        let startDt = parseTime(evt.start, targetDate);
                        let endDt = parseTime(evt.end, targetDate);

                        let eventObj = {
                            ...evt,
                            startDt,
                            endDt,
                            isToday: i === 0,
                            dayName: targetDate.toLocaleDateString('en-US', { weekday: 'long' })
                        };

                        if (i === 0 && now >= startDt && now < endDt) {
                            currentEvent = eventObj;
                        }

                        if (startDt > now) {
                            upcomingEvents.push(eventObj);
                        }
                    });
                }
            }

            upcomingEvents.sort((a, b) => a.startDt - b.startDt);
            return { current: currentEvent, next: upcomingEvents[0] };
        }

        function formatCountdownText(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            let days = Math.floor(totalSeconds / (3600 * 24));
            let hours = Math.floor((totalSeconds % (3600 * 24)) / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            
            // Simplified for mobile reading
            if (days > 0) return `${days} day${days !== 1 ? 's' : ''}, ${hours} hr${hours !== 1 ? 's' : ''}`;
            if (hours > 0) return `${hours} hr${hours !== 1 ? 's' : ''}, ${minutes} min`;
            if (minutes > 0) return `${minutes} min`;
            return `Moments`;
        }

        function formatDigitalTimer(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            let h = Math.floor(totalSeconds / 3600);
            let m = Math.floor((totalSeconds % 3600) / 60);
            let s = totalSeconds % 60;
            if (h > 0) return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateDashboard() {
            const now = new Date();
            
            // Mobile friendly clock (HH:MM AM/PM)
            document.getElementById('liveClock').textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
            document.getElementById('liveDate').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

            const { current, next } = getLiveEvents(now);

            const curInfoEl = document.getElementById('currentInfo');
            const curSubEl = document.getElementById('currentSubtext');
            const dot = document.getElementById('currentDot');

            if (current) {
                dot.className = 'status-dot';
                curInfoEl.textContent = current.subject;
                let details = `${current.start} - ${current.end}`;
                if (current.class) details += `<br>Class: ${current.class}`;
                if (current.location) details += ` | Loc: ${current.location}`;
                curSubEl.innerHTML = details;
                
                if (current.type === 'break') {
                    curInfoEl.style.color = 'var(--accent-olive)';
                } else if (current.type === 'duty') {
                    curInfoEl.style.color = 'var(--accent-terra)';
                } else {
                    curInfoEl.style.color = 'var(--accent-gold)';
                }
            } else {
                dot.className = 'status-dot idle';
                curInfoEl.textContent = "Peace & Rest";
                curInfoEl.style.color = "var(--text-muted)";
                curSubEl.textContent = "You have no scheduled class or duty at this moment.";
            }

            const timerEl = document.getElementById('countdownTimer');
            const nextSentEl = document.getElementById('nextSentence');

            if (next) {
                const diffMs = next.startDt - now;
                timerEl.textContent = formatDigitalTimer(diffMs);
                
                const timeText = formatCountdownText(diffMs);
                const className = next.class ? `${next.class} ` : "";
                
                let actionType = "gathering";
                if (next.type === "duty") actionType = "duty";
                if (next.type === "break") actionType = "rest";

                let sentence = `<strong>${timeText}</strong> until ${className}${next.subject}.`;
                
                if (!next.isToday) {
                    sentence += ` <span style="color: var(--text-muted); font-size: 0.95rem; display:block; margin-top:4px;">Scheduled for ${next.dayName} at ${next.start}</span>`;
                } else {
                     sentence += ` <span style="color: var(--text-muted); font-size: 0.95rem; display:block; margin-top:4px;">Begins at ${next.start}</span>`;
                }
                
                nextSentEl.innerHTML = sentence;
            } else {
                timerEl.textContent = "--:--";
                nextSentEl.textContent = "No upcoming gatherings found.";
            }
        }

        function checkFreeTime() {
            const dayStr = document.getElementById('searchDay').value;
            const startInput = document.getElementById('searchStart').value;
            const endInput = document.getElementById('searchEnd').value;
            const resultsEl = document.getElementById('searchResults');

            if (!startInput || !endInput) {
                resultsEl.innerHTML = `<span class="busy-text">Please provide times to seek.</span>`;
                return;
            }
            if (startInput >= endInput) {
                resultsEl.innerHTML = `<span class="busy-text">The end time must follow the start time.</span>`;
                return;
            }

            const dayNum = parseInt(dayStr);
            const daySchedule = scheduleMap[dayNum] || [];

            const toMinutes = (timeStr) => {
                const [h, m] = timeStr.split(':').map(Number);
                return h * 60 + m;
            };

            const searchStartMins = toMinutes(startInput);
            const searchEndMins = toMinutes(endInput);
            
            let conflicts = [];

            daySchedule.forEach(evt => {
                const evtStartMins = toMinutes(evt.start);
                const evtEndMins = toMinutes(evt.end);

                if (searchStartMins < evtEndMins && searchEndMins > evtStartMins) {
                    conflicts.push(evt);
                }
            });

            if (conflicts.length === 0) {
                resultsEl.innerHTML = `<span class="free-text">You are blessed with free time during this block.</span>`;
            } else {
                let html = `<span class="busy-text">You are engaged during this time:</span><ul class="conflict-list">`;
                conflicts.forEach(c => {
                    html += `<li>${c.start} - ${c.end}: ${c.subject} ${c.class ? '('+c.class+')' : ''}</li>`;
                });
                html += `</ul>`;
                resultsEl.innerHTML = html;
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 1000);

    </script>
</body>
</html>
